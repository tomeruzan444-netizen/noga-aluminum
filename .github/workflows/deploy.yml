name: Build & Deploy to Production

# Manual only. Hostinger blocks FTP from cloud/datacenter IPs (ETIMEDOUT), so the
# live site is deployed via direct FTP from the maintainer's machine
# (`node scripts/publish.mjs`). This workflow is kept for reference / emergencies.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload dist/ to the live site
        run: node scripts/deploy-update.mjs
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
