name: Migrate to Production (one-time)

# Triggered to cut over from WordPress. Safe to re-run: the script aborts unless the
# live WordPress root (wp-content) is found, so a second run after migration does nothing.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/migrate.yml']

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Archive WordPress + publish static site
        run: node scripts/migrate-production.mjs
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
